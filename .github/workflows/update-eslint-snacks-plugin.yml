name: Update eslint-plugin-snacks-pie-migration

on:
  push:
    branches:
      - main
    paths:
      - 'packages/components/**/package.json'
  workflow_dispatch:

env:
  HUSKY: 0
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  update-eslint-snacks-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: get-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.get-token.outputs.token }}

      - name: Setup Repo
        uses: ./.github/actions/setup-repo
        with:
          node-version: 24
          os: ubuntu-latest

      - name: Detect pieMetadata changes
        id: detect
        run: node ./packages/tools/pie-monorepo-utils/eslint-plugin-update/detect-changes.js

      - name: Create PR
        if: steps.detect.outputs.HAS_CHANGES == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
          CHANGES_SUMMARY: ${{ env.CHANGES_SUMMARY }}
        with:
          github-token: ${{ steps.get-token.outputs.token }}
          script: |
            const script = require('./packages/tools/pie-monorepo-utils/eslint-plugin-update/create-eslint-plugin-update-pr.js');
            const { BRANCH_NAME, CHANGES_SUMMARY } = process.env;
            const prUrl = await script({ github, branchName: BRANCH_NAME, changesSummary: CHANGES_SUMMARY });
            core.exportVariable('PR_URL', prUrl);

      - name: Notify Slack
        if: steps.detect.outputs.HAS_CHANGES == 'true' && github.event_name != 'workflow_dispatch'
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        with:
          channel-id: ${{ secrets.REVIEWS_SLACK_CHANNEL_ID }}
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":pie: A new PR is ready for review: <${{ env.PR_URL }}|Update eslint rules for PIE migration>"
                  }
                }
              ],
              "unfurl_links": false,
              "unfurl_media": false
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
