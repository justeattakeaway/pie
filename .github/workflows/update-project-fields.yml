name: DS Review Tracker – Update Project Fields

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  update-project-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Update Project Fields
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROJECTS_SECRET }}
          ORGANIZATION: ${{ github.repository_owner }}
          PROJECT_NUMBER: 5 # The project number for the Design System Review Tracker
        run: |
          echo "ORGANIZATION: $ORGANIZATION"
          echo "$GITHUB_TOKEN" | gh auth status
          echo "Project Number: $PROJECT_NUMBER"
          echo "$PROJECT_NUMBER" | jq type

          # Get project ID and fields in one query
          PROJECT_DATA=$(gh api graphql --input - <<EOF
          {
            "query": "query(\$org: String!, \$number: Int!) {
              organization(login: \$org) {
                projectV2(number: \$number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2Field { id name }
                      ... on ProjectV2SingleSelectField {
                        id name options { id name }
                      }
                    }
                  }
                }
              }
            }",
            "variables": {
              "org": "$ORGANIZATION",
              "number": 5
            }
          }
          EOF)

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.id')
          DATE_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name=="Date Opened") | .id')
          PRIORITY_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name=="Priority") | .id')
          PRIORITY_OPTION_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name=="Priority") | .options[] | select(.name=="Medium") | .id')
          SIZE_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name=="Size") | .id')
          SIZE_OPTION_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name=="Size") | .options[] | select(.name=="M") | .id')

          # Get the item ID for this PR
          ITEM_ID=$(gh api graphql -f query='
            query($project:ID!, $org:String!, $repo:String!, $pr_number:Int!, $number:Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  items(first: 1, filter: {path: $repo + "#" + $pr_number}) {
                    nodes {
                      id
                    }
                  }
                }
              }
            }
            ' -f project=$PROJECT_ID -f org=$ORGANIZATION -f repo=${{ github.event.repository.name }} -f pr_number=${{ github.event.pull_request.number }} -f number=$PROJECT_NUMBER --jq '.data.organization.projectV2.items.nodes[0].id')

          # Update all fields in one mutation
          gh api graphql -f query='
            mutation(
              $project:ID!,
              $item:ID!,
              $dateField:ID!,
              $priorityField:ID!,
              $sizeField:ID!,
              $priorityOption:String!,
              $sizeOption:String!,
              $date:Date!
            ) {
              dateUpdate: updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $item
                fieldId: $dateField
                value: { date: $date }
              }) {
                projectV2Item { id }
              }
              priorityUpdate: updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $item
                fieldId: $priorityField
                value: { singleSelectOptionId: $priorityOption }
              }) {
                projectV2Item { id }
              }
              sizeUpdate: updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $item
                fieldId: $sizeField
                value: { singleSelectOptionId: $sizeOption }
              }) {
                projectV2Item { id }
              }
            }
            ' -f project=$PROJECT_ID \
              -f item=$ITEM_ID \
              -f dateField=$DATE_FIELD_ID \
              -f priorityField=$PRIORITY_FIELD_ID \
              -f sizeField=$SIZE_FIELD_ID \
              -f priorityOption=$PRIORITY_OPTION_ID \
              -f sizeOption=$SIZE_OPTION_ID \
              -f date=$(date +%Y-%m-%d)
