name: setup-repo
description: Sets up the repo

inputs:
  os:
    description: 'The operating system required for the GitHub action job.'
    required: true

runs:
  using: composite
  steps:
      # Read Node version from mise.toml (source of truth post-Volta migration)
      - name: Read Node version from mise.toml
        id: node
        shell: bash
        run: |
          version=$(grep -E '^node\s*=' .mise.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo 'Failed to read node version from .mise.toml'
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      # Setup Node (also restores Yarn global cache keyed on yarn.lock)
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: "yarn"
      - name: Get caching params
        id: cache-params
        shell: bash
        run: |
          echo "::group::Cache params"
          node_version=$(node -v)
          yarn_version=$(yarn -v)
          yarn_cache_path=$(yarn config get cacheFolder)
          yarn_state_path=$(yarn config get installStatePath)
          echo "node-version=$node_version" >> "$GITHUB_OUTPUT"
          echo "yarn-version=$yarn_version" >> "$GITHUB_OUTPUT"
          echo "yarn-cache-path=$yarn_cache_path" >> "$GITHUB_OUTPUT"
          echo "yarn-state-path=$yarn_state_path" >> "$GITHUB_OUTPUT"
          echo "node:        $node_version"
          echo "yarn:        $yarn_version"
          echo "cacheFolder: $yarn_cache_path"
          echo "stateFile:   $yarn_state_path"
          echo "::endgroup::"
      # Cache node_modules across runs so the Yarn link step can be skipped on hit
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            **/node_modules
            ${{ steps.cache-params.outputs.yarn-cache-path }}
            ${{ steps.cache-params.outputs.yarn-state-path }}
          key: y9rn4-${{ runner.os }}-${{ runner.arch }}-node-${{ steps.cache-params.outputs.node-version }}-${{ hashFiles('**/yarn.lock') }}
      # Install deps only when cache misses. Use --immutable so CI fails on lockfile drift.
      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        shell: bash
        run: yarn install --immutable
